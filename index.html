<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Editor Interface</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .editor { padding: 20px; }
        .button { margin: 5px; }
    </style>
</head>
<body>
    <div class="editor">
        <h1>Media Editor Interface</h1>
        <div>
            <button class="button">Split</button>
            <button class="button">Volume</button>
            <div class="dropdown">
                <button class="button">Advanced Editing</button>
                <div class="dropdown-content">
                    <button>Animation</button>
                    <button>Effects</button>
                    <button>Delete</button>
                    <button>Speed</button>
                    <button>Beats</button>
                    <button>Crop</button>
                    <button>Duplicate</button>
                    <button>Replace</button>
                    <button>Overlay</button>
                    <button>Adjust</button>
                    <button>Filters</button>
                    <button>Retouch</button>
                    <button>Remove BG</button>
                    <button>Relight</button>
                    <button>Opacity</button>
                    <button>Motion Blur</button>
                    <button>Transform</button>
                    <button>Auto Reframe</button>
                    <button>Stabilization</button>
                    <button>Extract Audio</button>
                    <button>Isolate Voice</button>
                    <button>Reduce Noise</button>
                    <button>Audio Effects</button>
                    <button>Enhance Voice</button>
                    <button>Freeze</button>
                    <button>Reverse</button>
                    <button>Mask</button>
                    <button>Unlink</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
