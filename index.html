<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Editor - MediaEditor Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🎬 MediaEditor Pro</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="photo-editor.html" class="active">Photo Editor</a></li>
                <li><a href="video-editor.html">Video Editor</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Editor Container -->
    <div class="editor-container">
        <!-- Left Side - Preview & Upload -->
        <div class="editor-left">
            <div class="preview-section">
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="photoInput" accept="image/*" hidden>
                    <div class="upload-placeholder">
                        <p>📁 Click to select or drag photo here</p>
                        <small>JPG, PNG, GIF supported</small>
                    </div>
                </div>
                <canvas id="photoCanvas" style="display: none;"></canvas>
            </div>

            <!-- Active Adjustments Display -->
            <div class="active-effects" id="activeEffects">
                <h4>Active Adjustments:</h4>
                <div id="effectsList"></div>
            </div>
        </div>

        <!-- Right Side - Controls -->
        <div class="editor-right">
            <div class="controls-container">
                <!-- Quick Actions -->
                <div class="control-section">
                    <h3>⚡ Quick Actions</h3>
                    <div class="action-buttons">
                        <button class="btn-action" onclick="downloadPhoto()">⬇️ Download</button>
                        <button class="btn-action btn-danger" onclick="resetAllPhoto()">🔄 Reset All</button>
                        <button class="btn-action" onclick="undoPhotoAction()">↶ Undo</button>
                    </div>
                </div>

                <!-- Basic Tools -->
                <div class="control-section">
                    <h3>🛠️ Basic Tools</h3>
                    <div class="tool-buttons">
                        <button class="tool-btn" onclick="activatePhotoTool('crop')">🔲 Crop</button>
                        <button class="tool-btn" onclick="activatePhotoTool('rotate')">🔄 Rotate</button>
                        <button class="tool-btn" onclick="activatePhotoTool('flip')">↔️ Flip</button>
                        <button class="tool-btn" onclick="activatePhotoTool('resize')">📏 Resize</button>
                    </div>
                </div>

                <!-- Filters -->
                <div class="control-section">
                    <h3>🎨 Filters</h3>
                    <div class="filter-buttons">
                        <button class="filter-btn" onclick="applyPhotoFilter('original')">Original</button>
                        <button class="filter-btn" onclick="applyPhotoFilter('grayscale')">⚫ B&W</button>
                        <button class="filter-btn" onclick="applyPhotoFilter('sepia')">🟤 Sepia</button>
                        <button class="filter-btn" onclick="applyPhotoFilter('vintage')">📸 Vintage</button>
                        <button class="filter-btn" onclick="applyPhotoFilter('cool')">❄️ Cool</button>
                        <button class="filter-btn" onclick="applyPhotoFilter('warm')">🔥 Warm</button>
                        <button class="filter-btn" onclick="applyPhotoFilter('invert')">🔲 Invert</button>
                        <button class="filter-btn" onclick="applyPhotoFilter('blur')">🌫️ Blur</button>
                    </div>
                </div>

                <!-- Adjustments -->
                <div class="control-section">
                    <h3>🎚️ Adjustments</h3>
                    
                    <div class="slider-group">
                        <div class="slider-header">
                            <label>☀️ Brightness</label>
                            <span class="slider-value" id="brightnessDisplay">100%</span>
                        </div>
                        <input type="range" id="brightness" min="0" max="200" value="100" class="slider" oninput="updatePhotoAdjustment('brightness')">
                    </div>

                    <div class="slider-group">
                        <div class="slider-header">
                            <label>◐ Contrast</label>
                            <span class="slider-value" id="contrastDisplay">100%</span>
                        </div>
                        <input type="range" id="contrast" min="0" max="200" value="100" class="slider" oninput="updatePhotoAdjustment('contrast')">
                    </div>

                    <div class="slider-group">
                        <div class="slider-header">
                            <label>🎨 Saturation</label>
                            <span class="slider-value" id="saturationDisplay">100%</span>
                        </div>
                        <input type="range" id="saturation" min="0" max="200" value="100" class="slider" oninput="updatePhotoAdjustment('saturation')">
                    </div>

                    <div class="slider-group">
                        <div class="slider-header">
                            <label>🌈 Hue</label>
                            <span class="slider-value" id="hueDisplay">0°</span>
                        </div>
                        <input type="range" id="hue" min="0" max="360" value="0" class="slider" oninput="updatePhotoAdjustment('hue')">
                    </div>

                    <div class="slider-group">
                        <div class="slider-header">
                            <label>🔆 Exposure</label>
                            <span class="slider-value" id="exposureDisplay">0</span>
                        </div>
                        <input type="range" id="exposure" min="-100" max="100" value="0" class="slider" oninput="updatePhotoAdjustment('exposure')">
                    </div>

                    <div class="slider-group">
                        <div class="slider-header">
                            <label>🎯 Sharpness</label>
                            <span class="slider-value" id="sharpnessDisplay">0</span>
                        </div>
                        <input type="range" id="sharpness" min="0" max="100" value="0" class="slider" oninput="updatePhotoAdjustment('sharpness')">
                    </div>

                    <div class="slider-group">
                        <div class="slider-header">
                            <label>👻 Opacity</label>
                            <span class="slider-value" id="opacityDisplay">100%</span>
                        </div>
                        <input type="range" id="opacity" min="0" max="100" value="100" class="slider" oninput="updatePhotoAdjustment('opacity')">
                    </div>
                </div>

                <!-- Effects -->
                <div class="control-section">
                    <h3>✨ Effects</h3>
                    <div class="effect-buttons">
                        <button class="effect-btn" onclick="applyPhotoEffect('glow')">💫 Glow</button>
                        <button class="effect-btn" onclick="applyPhotoEffect('vignette')">🎯 Vignette</button>
                        <button class="effect-btn" onclick="applyPhotoEffect('fade')">🌅 Fade</button>
                        <button class="effect-btn" onclick="applyPhotoEffect('shadow')">🌑 Shadow</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 MediaEditor Pro. Built by Royalking2112 ❤️</p>
    </footer>

    <script src="photo-editor.js"></script>
</body>
</html>
